<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Syrve Theme Comparison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Segoe UI, sans-serif; background: #1a1a1a; color: #eee; transition: background 0.3s, color 0.3s; }
body.light-mode { background: #f0f0f0; color: #222; }

.top-tabs {
    display: flex; gap: 0; background: #111; border-bottom: 2px solid #333;
    position: sticky; top: 0; z-index: 100;
}
.top-tabs button {
    flex: 1; padding: 14px 20px; border: none; background: #222; color: #999;
    font-size: 15px; cursor: pointer; transition: all 0.2s;
}
.top-tabs button.active { background: #333; color: #fff; border-bottom: 3px solid #7BAAF0; }
.top-tabs button:hover:not(.active) { background: #2a2a2a; color: #ccc; }
body.light-mode .top-tabs { background: #e0e0e0; border-bottom-color: #ccc; }
body.light-mode .top-tabs button { background: #e8e8e8; color: #666; }
body.light-mode .top-tabs button.active { background: #fff; color: #222; border-bottom-color: #3B82F6; }
body.light-mode .top-tabs button:hover:not(.active) { background: #f0f0f0; color: #444; }

.theme-tabs {
    display: flex; gap: 0; background: #222; border-bottom: 1px solid #444;
    position: sticky; top: 49px; z-index: 99; flex-wrap: wrap;
}
.theme-tabs button {
    padding: 10px 18px; border: none; background: #2a2a2a; color: #888;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.theme-tabs button.active { background: #444; color: #fff; border-bottom: 2px solid #7BAAF0; }
.theme-tabs button:hover:not(.active) { background: #333; color: #bbb; }
body.light-mode .theme-tabs { background: #e8e8e8; border-bottom-color: #ddd; }
body.light-mode .theme-tabs button { background: #ececec; color: #666; }
body.light-mode .theme-tabs button.active { background: #fff; color: #222; border-bottom-color: #3B82F6; }
body.light-mode .theme-tabs button:hover:not(.active) { background: #f4f4f4; color: #444; }

.compare-container { padding: 20px; }
.compare-pair {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 20px;
}
.compare-pair .label {
    text-align: center; font-size: 11px; color: #888; padding: 4px 0;
    text-transform: uppercase; letter-spacing: 1px;
}
.compare-pair img {
    width: 100%; height: auto; border-radius: 4px;
    border: 1px solid #333;
}
body.light-mode .compare-pair img { border-color: #ccc; }
body.light-mode .screen-title { color: #999; }
body.light-mode .compare-pair .label { color: #666; }
.screen-title {
    text-align: center; font-size: 13px; color: #666; margin: 20px 0 8px;
    text-transform: uppercase; letter-spacing: 2px;
}
.doc-container {
    max-width: 1100px; margin: 0 auto; padding: 30px 40px;
    font-size: 14px; line-height: 1.7;
}
.doc-container h1 { font-size: 22px; margin: 30px 0 15px; border-bottom: 1px solid #444; padding-bottom: 8px; }
.doc-container h2 { font-size: 18px; margin: 25px 0 12px; }
.doc-container h3 { font-size: 15px; margin: 20px 0 10px; }
.doc-container table { border-collapse: collapse; width: 100%; margin: 10px 0 20px; font-size: 13px; }
.doc-container th, .doc-container td { border: 1px solid #444; padding: 6px 10px; text-align: left; }
.doc-container th { background: #2a2a2a; }
.doc-container code { background: #2a2a2a; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
.doc-container ul, .doc-container ol { padding-left: 24px; margin: 8px 0; }
.doc-container li { margin: 4px 0; }
.doc-container hr { border: none; border-top: 1px solid #444; margin: 25px 0; }
.doc-container strong { color: #ddd; }
body.light-mode .doc-container th { background: #e8e8e8; }
body.light-mode .doc-container th, body.light-mode .doc-container td { border-color: #ccc; }
body.light-mode .doc-container code { background: #e8e8e8; }
body.light-mode .doc-container h1 { border-bottom-color: #ccc; }
body.light-mode .doc-container strong { color: #222; }
body.light-mode .doc-container hr { border-top-color: #ccc; }
</style>
</head>
<body>

<div class="top-tabs" id="topTabs"></div>
<div class="theme-tabs" id="themeTabs"></div>
<div class="compare-container" id="content"></div>

<script>
const DOC_CONTENT = '# Система тем Syrve POS — Документация по архитектуре\n\n## 1. Архитектура системы тем\n\n### Как работает Themes.xml\n\nСистема тем Syrve POS построена на пользовательском механизме переопределения ресурсов на базе XML. Темы определяются в файле `Themes.xml`, расположенном в рабочей директории приложения. Каждая тема представляет собой элемент `<Theme>` с двумя ключевыми атрибутами:\n\n- **Name** — уникальный идентификатор темы (например, `SyrveDarkBlue`)\n- **BasedOn** — родительская тема для наследования (например, `DefaultTheme.Dark`, `SyrveDarkBlue`)\n\nТемы поддерживают три типа ресурсов:\n- **Brush** — цветовые значения в формате `#AARRGGBB` или ссылки на другие имена Brush (например, `Button.Checked`, `Footer.Background`)\n- **FontSize** — числовые размеры шрифтов или ссылки вида `FontSize.Normal`\n- **FontFamily** — имена семейств шрифтов (например, `Segoe UI`)\n\n**Модель наследования**: дочерняя тема наследует все ресурсы от родительской темы, указанной в `BasedOn`, и должна переопределять только те ресурсы, которые хочет изменить. Ссылки на ресурсы (например, `<Brush Name="ListItem.Selected">Button.Checked</Brush>`) разрешаются динамически внутри темы.\n\n### Связь с XSD-схемой\n\nСхема `Themes.g.xsd` определяет все допустимые имена и типы ресурсов. Она встроена в `Resto.Front.Common.Ui.dll` как манифест-ресурс по пути `Resto.Front.Common.Ui.Resources.Theme.Themes.g.xsd`. При запуске приложения `CreateThemesXmlReaderSettings()` загружает эту XSD для валидации `Themes.xml`.\n\n**Баг**: XSD не встроена в текущую сборку. Код `Assembly.GetManifestResourceNames().Single(n => n.EndsWith("Themes.g.xsd"))` выбрасывает исключение, поскольку подходящий ресурс отсутствует. Это исправляется патчем через Mono.Cecil путём встраивания XSD в DLL.\n\n### Связь со встроенными темами в DLL\n\nДва встроенных XML-файла определяют базовые темы:\n- **`thememanager.xml`** — тёмная базовая тема (`DefaultTheme.Dark`)\n- **`thememanager.lighttheme.xml`** — светлая базовая тема (`DefaultTheme.Light`)\n\nКласс `ThemeManager` (305 методов, 307 полей) предоставляет каждый ресурс как статическое свойство, вызывающее `GetResource<Brush>(string key)`. Пользовательские темы из `Themes.xml` накладываются поверх этих встроенных значений по умолчанию.\n\n### Патчинг DLL\n\nПоскольку XSD отсутствует в текущей сборке, патчер на основе Mono.Cecil (`~/patch-dll/PatchDll/`) встраивает:\n1. Схему `Themes.g.xsd` как манифест-ресурс\n2. Любые дополнительные свойства ресурсов тем, необходимые для патчинга конвертеров\n\n---\n\n## 2. Текущая структура тем\n\n### Светлые темы (5)\n\n| # | Имя темы | BasedOn | Акцентный цвет | Описание палитры | Переопределения |\n|---|---|---|---|---|---|\n| 1 | **SyrveLightGreen** | DefaultTheme.Light | Зелёный `#FF35BE60` | Холодная сине-лавандовая основа (`#FFC5CBDE` окно), зелёные акцентные кнопки, тёмно-синий подвал `#FF232545`. Классический корпоративный вид. | ~143 (полная база) |\n| 2 | **SyrveLightMint** | SyrveLightGreen | Мятный `#FF60B8A0` | Мягкая зелёно-серая основа (`#FFE0E5E2` окно), мятный акцент, белые заголовки, тёмно-бирюзовый подвал `#FF1A3028`. Свежий и успокаивающий. | ~55 |\n| 3 | **SyrveLightSand** | SyrveLightGreen | Терракотовый `#FFD0856A` | Тёплая бежевая основа (`#FFE8E0D8` окно), терракотовый/коралловый акцент, белые заголовки, тёмно-коричневый подвал `#FF3A2820`. Земляная теплота. | ~55 |\n| 4 | **SyrveLightLavender** | SyrveLightGreen | Фиолетовый `#FFA898D0` | Мягкая лавандовая основа (`#FFE5E0F0` окно), фиолетовый акцент, белые заголовки, глубокий фиолетовый подвал `#FF2A2040`. Элегантный и современный. | ~55 |\n| 5 | **SyrveLightGray** | SyrveLightGreen | Синий `#FF7BAAF0` | Нейтральная серая основа (`#FFECEDF0` окно), яркий синий акцент, белые заголовки, тёмно-сланцевый подвал `#FF1F2937`. Чистый и минималистичный. | ~58 |\n\n### Тёмные темы (5)\n\n| # | Имя темы | BasedOn | Акцентный цвет | Описание палитры | Переопределения |\n|---|---|---|---|---|---|\n| 6 | **SyrveDarkBlue** | DefaultTheme.Dark | Тёмно-синий `#FF3C5596` | Тёмная угольная основа (`#FF1E1F22` окно), синий акцент для выделения/кнопок, жёлтый значок уведомлений. Поверхности с синим оттенком `#FF303039`. | ~143 (полная база) |\n| 7 | **SyrveDarkOcean** | SyrveDarkBlue | Бирюзовый `#FF155855` | Холодная тёмно-бирюзовая основа (`#FF1A1D24` окно), глубокий бирюзовый акцент, циановые-зелёные блики `#FF2AA8A0`. Ощущение морской глубины. | ~57 |\n| 8 | **SyrveDarkCharcoal** | SyrveDarkBlue | Янтарный `#FF8B6530` | Тёплая тёмно-коричневая основа (`#FF1C1A18` окно), золотисто-янтарный акцент, тёплый серый текст `#FF908880`. Атмосфера кофейни. | ~50 |\n| 9 | **SyrveDarkSage** | SyrveDarkBlue | Лесной зелёный `#FF366048` | Тёмная основа с зелёным оттенком (`#FF1A1E1C` окно), шалфейный/лесной акцент, приглушённый зелёный текст `#FF889088`. Вдохновлено природой. | ~57 |\n| 10 | **SyrveDarkIndigo** | SyrveDarkBlue | Индиго `#FF2A2588` | Глубокая сине-фиолетовая основа (`#FF14151E` окно), яркий индиго-акцент `#FF4A42EC`, холодные фиолетовые тона. Электрическая ночь. | ~57 |\n\n---\n\n## 3. Руководство по настройке элементов интерфейса\n\nКакие ресурсы отвечают за какие элементы UI. Практическое руководство: «хочешь изменить X — меняй ресурс Y».\n\n### Общие элементы\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Фон окна/страницы | `Window.Background` | Основной фон за всеми элементами |\n| Основной цвет текста | `Block.Normal.Foreground` | Глобальный — влияет на текст по всему интерфейсу, не только в Block-секциях |\n| Акцент (выделение, активные кнопки) | `Button.Checked` | Используется через ссылки в `PageItem.Checked.Background`, `FooterItem.Checked.Background`, `ListItem.Selected` |\n| Нажатая кнопка | `Button.Pressed` | Используется через ссылки в `FooterItem.Pressed.Background`, `ListItem.MultiSelected` |\n| Текст на акцентном фоне | `PageItem.Checked.Foreground` | Тёмный для светлых тем, белый для тёмных |\n\n### Заголовок (Header)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Фон заголовка | `Header.Background` | В светлых темах = белый, в тёмных = цвет поверхности |\n| Текст заголовка | `Header.Foreground` | |\n| Кнопки заголовка (активные) | `HeaderItem.Normal.Background` / `.Foreground` | |\n| Кнопки заголовка (неактивные) | `HeaderItem.Disabled.Background` / `.Foreground` | |\n\n### Нижняя панель (Footer)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Фон футера | `Footer.Background` | В светлых — тёмный (как акцент), в тёмных — самый тёмный слой |\n| Иконки/текст футера | `FooterItem.Normal.Foreground` | **Также** управляет иконками кнопок доставки (общий, разделить нельзя) |\n| Прокрутка | `ScrollButton.Background` / `.Foreground` | Обычно = Footer.Background |\n\n### Страница заказа (Order Edit)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Карточки групп меню (Food, Drinks) | `ThemeBrush.Background` | Также = `GridAdorner.Background` |\n| Текст карточек групп | `ThemeBrush.Foreground` | **Не работает** — при тестировании эффекта не обнаружено |\n| Фон списка блюд (нечётные) | `ListItem.Odd` | |\n| Фон списка блюд (чётные) | `ListItem.Even` | |\n| Выделенная строка | `ListItem.Selected` | = `Button.Checked`. Нет отдельного Foreground — текст определяется конвертером статуса |\n| Кнопки курсов (невыбранные) | `OrderEditView.CourseButton.Background` | = `ThemeBrush.Background` для единообразия |\n| Кнопки курсов (текст) | `OrderEditView.CourseButton.Foreground` | Белый в тёмных, тёмный в светлых |\n| Кнопки курсов (выбранный текст) | `OrderEditView.CourseButton.Selected.Foreground` | Фон выбранного = `Button.Checked` |\n| Подсказки | `PageItem.Hint.Foreground` | **Также** управляет цветом умолчательной кнопки в MessageBox |\n| Текст блюд (цвет статуса) | `TableStatus.*` | Задаётся через конвертер `OrderProductStateToBrushConverter`, не через отдельный ресурс |\n\n### Грид по официантам (ByWaiter)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Хидер/футер карточки заказа | `ListAdorner.Background` | По документации — фон разделителя/декоратора списка на странице заказа. Фактически влияет на хидер/футер карточек ByWaiter и невыбранные табы на странице закрытых заказов |\n| Тело карточки заказа | `Window.Background` | |\n| Рамки ячеек грида | `TableStatus.Vacant.Border` | Также = рамка пустого стола на плане зала |\n| Иконка «+» на пустых ячейках | Не тематизируется | Цвет захардкожен |\n\n### Страница оплаты (Payment)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Заголовки гостей (GUEST 1, GUEST 2) | `OrderItem.Deleted` | Найдено экспериментально — неожиданное использование |\n| Фон блока оплаты | `PaymentPageView.Block.Background` | = `Window.Background` |\n| Дополнительные кнопки (+1, +5...) | `PaymentPageView.AdditionalButtons.Background` | |\n| Фон нампада | `Numpad.Background` | |\n| Дополнительные кнопки нампада | `Numpad.AdditionalButtons.Background` | |\n\n### Доставка (Delivery)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Кнопки статусов (иконки) | `FooterItem.Normal.Foreground` | Общий с футером, разделить нельзя |\n| Неактивные кнопки (иконки) | `GridAdorner.Disabled.Foreground` | |\n| Цвета статусов | `DeliveryStatus.*` | Наследование по смыслу: готово→зелёный, в пути→голубой, опоздание→красный |\n\n### Статусы столов\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Новый | `TableStatus.New` | Также цвет текста блюд через конвертер |\n| Отправлен на кухню | `TableStatus.HasPrintedDishes` | |\n| Готов | `TableStatus.HasReadyDishes` | |\n| Подан | `TableStatus.HasServedDishes` | |\n| Пречек | `TableStatus.OrderPrecheque` | |\n| Рамка пустого стола | `TableStatus.Vacant.Border` | Также рамки грида ByWaiter |\n\n### Диалоговые окна (MessageBox)\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Фон кнопок | `Footer.Background` | Футер диалога = основной футер |\n| Текст обычных кнопок | `FooterItem.Normal.Foreground` | |\n| Текст умолчательной кнопки (Yes/OK) | `PageItem.Hint.Foreground` | `MessageBox.DefaultButton.Foreground` существует в XSD, но **не используется** |\n\n### Отчёты\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Фон отчёта | `Block.Normal.Background` | |\n| Текст отчёта | **Не тематизируется** | Чёрный по умолчанию WPF. `Block.Normal.Foreground` обнаружен в BAML отчётов, но не влияет |\n\n### Ценник на карточке товара\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Фон ценника | **Не тематизируется** | Жёстко задан белым в BAML |\n| Текст ценника | `CommonForeground.Black` | В тёмных темах конфликтует — нужен тёмный для ценника, но светлый для остального |\n\n### Прочее\n\n| Элемент | Ресурс | Примечание |\n|---|---|---|\n| Логин — фон | `LoginView.Background` | |\n| Логин — верхняя панель | `LoginView.Top.Background` | |\n| Логин — элементы списка | `LoginViewItem.Background` | |\n| Уведомления: ошибка | `Message.Error.Background` | |\n| Уведомления: предупреждение | `Message.Warn.Background` | |\n| Уведомления: информация | `Message.Notify.Background` | |\n| Текст на белом поле ввода (E-MAIL) | **Не тематизируется** | Фон белый, захардкожен в BAML |\n\n---\n\n## 3a. Обнаруженные нестыковки ресурсов\n\nРесурсы, которые по имени или документации должны управлять одним, но фактически влияют на другое или не работают:\n\n| Ресурс | Ожидаемое (по имени) | Фактическое поведение |\n|---|---|---|\n| `OrderItem.Deleted` | Фон удалённых позиций | Заголовки гостей на странице оплаты |\n| `ListAdorner.Background` | Разделители списков | Хидер/футер карточек ByWaiter + невыбранные табы типов заказов на странице закрытых заказов |\n| `TableStatus.Vacant.Border` | Рамка пустого стола | Также рамки всех ячеек грида ByWaiter |\n| `FooterItem.Normal.Foreground` | Иконки футера | Также иконки кнопок доставки (нельзя разделить) |\n| `PageItem.Hint.Foreground` | Текст подсказок | Также цвет умолчательной кнопки MessageBox (нельзя разделить) |\n| `ThemeBrush.Foreground` | Текст на карточках групп | Не влияет ни на что видимое. Назначение неизвестно |\n| `MessageBox.DefaultButton.Foreground` | Текст умолчательной кнопки | Не работает — BAML использует `PageItem.Hint.Foreground` вместо него |\n| `Block.Normal.Foreground` | Текст блоков | Глобальный цвет текста по всему UI. В BAML отчётов присутствует, но на отчёты не влияет |\n| `CommonForeground.Black` | Тёмный цвет текста | Также текст ценника на белом фоне — конфликт в тёмных темах |\n| `GridAdorner.Disabled.Foreground` | Неактивный адорнер | Также иконки disabled-кнопок доставки |\n| `GridAdorner.Background` | Фон адорнера сетки | Не влияет ни на что видимое. При тестировании эффекта не обнаружено |\n\n---\n\n## 4. Применённые принципы дизайна\n\n### Компромиссы и принципы светлых тем\n\n- **Футер тёмный, хидер белый**: тёмный футер создаёт акцент и завершённость страницы, белый хидер — чистоту и воздух. Если сделать оба светлыми, тема становится блёклой и неинтересной.\n- **Баланс яркости статусов**: цвета статусов столов (`TableStatus.*`) должны быть достаточно тёмными, чтобы читаться на светлом фоне списка, но при этом достаточно светлыми, чтобы читаться на акцентном фоне активной (выделенной) строки. В XSD нет `ListItem.Selected.Foreground` — цвет текста на выделенной строке определяется конвертером и не контролируется отдельно.\n- **Баланс яркости акцента**: акцент (`Button.Checked`) должен быть достаточно ярким, чтобы визуально отличаться от карточек групп, фона и других элементов, но при этом достаточно светлым, чтобы текст статусов оставался читаемым на его фоне.\n- **Различение карточек и акцента**: `ThemeBrush.Background` (карточки групп) отличается от акцентного цвета, чтобы на страницах оплаты и в закрытых заказах было видно, какой элемент выбран, а какой нет.\n- **ListAdorner — промежуточный тон**: `ListAdorner.Background` = среднее между `ThemeBrush.Background` и `Window.Background`. Это нужно для разделения невыбранных табов от выбранных (карточки групп) и от фона страницы.\n- **Иерархия поверхностей** (от тёмного к светлому): Footer → ThemeBrush (карточки) → ListAdorner → Window.Background → ListItem.Even → ListItem.Odd/Header (белый).\n\n### Компромиссы и принципы тёмных тем\n\n- **Футер — самый тёмный, но не чёрный**: футер темнее всех фонов и акцентов, но не чисто чёрный (`#000000`), иначе с ним будут сливаться диалоговые окна и другие элементы.\n- **Баланс яркости статусов**: цвета статусов столов должны быть достаточно светлыми, чтобы читаться на тёмном фоне списка, но при этом достаточно тёмными, чтобы читаться на акцентном фоне активной строки.\n- **Баланс яркости акцента**: акцент должен быть достаточно ярким и тёмным, чтобы визуально смотреться и отличаться от других цветов темы, но при этом достаточно светлым, чтобы тексты статусов оставались читаемыми на его фоне.\n- **Иерархия поверхностей** (от тёмного к светлому): Footer → Window.Background → Surface (ListItem.Odd) → ListItem.Even → ThemeBrush (карточки) → Accent.\n\n### Правила назначения ресурсов\n- **OrderItem.Deleted = ThemeBrush.Background** — обеспечивает видимость заголовков гостей на странице оплаты и соответствие среднему тону темы.\n- **ListAdorner.Background = цвет поверхности (ListItem.Odd)** — создаёт чистые карточки «По официантам», где шапка/подвал сливается с телом карточки в тёмных темах, или использует акцентный тон в светлых темах.\n- **CourseButton.Background = ThemeBrush.Background** (тёмная) или чуть более светлая поверхность (светлая) — поддерживает согласованность с карточками групп.\n\n### Статусы доставки: цвета и наследование\n\nИзменена цепочка наследования — в дефолте из DLL 6 статусов имели логически неверные ссылки (готовое было жёлтым, опоздание — нейтральным). **Требует согласования** — изменение наследования может повлиять на рабочие процессы. Возможно потребуется откат к дефолтной цепочке, ограничившись только адаптацией палитры цветов.\n\n**Цепочка наследования (одинаковая для светлых и тёмных):**\n- `CookingStarted` → `WaitingTimeToCook` (нейтральный/ожидание)\n- `Waiting` → `Unconfirmed` (жёлтый/ожидание подтверждения)\n- `CookingCompleted` → `DeliveryGoesToBase` (зелёный/успех) — было → Unconfirmed\n- `Packed` → `DeliveryGoesToBase` (зелёный/успех) — было → Unconfirmed\n- `OnWayGoesToClient` → `TimeToCook` (голубой/в процессе) — было → WaitingTimeToCook\n- `Paid` → `DeliveryGoesToBase` (зелёный/успех)\n- `OnWayLatesToClient` → `Warning` (красный/тревога) — было → WaitingTimeToCook\n- `TimeToCookExceeded` → `Warning` (красный/тревога) — было → TimeToCook\n- `DeliveryLatesToBase` → `Warning` (красный/тревога) — было → GoesToBase\n\n**Цвета базовых статусов:**\n\n| Статус | Смысл | Дефолт DLL (тёмная) | Светлые (LightGreen) | Тёмные (DarkBlue) |\n|---|---|---|---|---|\n| WaitingTimeToCook | В очереди | `#EDEDED` почти белый | `#B8C0D5` серо-голубой | `#3A3A48` тёмный серый |\n| Unconfirmed | Не подтверждён | `#F9DF5F` яркий жёлтый | `#D4BC5A` приглушённый золотой | `#6A5A20` тёмное золото |\n| TimeToCook | Время готовки | `#70CEEB` яркий голубой | `#6A9DC0` приглушённый голубой | `#4A80A0` тёмный голубой |\n| DeliveryGoesToBase | Завершено | `#9DD195` светло-зелёный | `#5AAA78` средний зелёный | `#439677` тёмный зелёный |\n| Warning | Тревога | `#D64D4C` красный | `#E07060` светлый красный | `#7A2A2A` тёмный красный |\n\n### Решение по FontFamily\nРесурсы `FontFamily.*` (Normal, Semibold, Bold, Bolder, Extrabold) лучше не переопределять. В интерфейсе неочевидно, где какой ресурс шрифта применяется, и попытки переопределения приводят к хаотичным изменениям толщины текста по всему UI. WPF при переопределении семейства шрифта активирует синтез начертаний (искусственное утолщение), из-за чего текст выглядит непредсказуемо толще или тоньше оригинала. В итоге все переопределения FontFamily были удалены — используются системные шрифты по умолчанию.\n\n---\n\n## 5. Известные ограничения\n\n1. **Цвет текста отчётов в тёмных темах**: `ReportsView` использует `ReceiptListStyle` из `ListDictionary.baml`, который не привязывает Foreground к какому-либо ресурсу темы. Объекты GlyphLine наследуют чёрный цвет текста по умолчанию из WPF. `Block.Normal.Foreground` существует, но игнорируется. Отчёты нечитаемы в тёмных темах.\n\n2. **Иконки кнопок статуса доставки используют FooterItem.Normal.Foreground**: кнопки действий статуса доставки (CANCEL, CONFIRMED, MAKE, DISPATCH, DELIVERED, CLOSE) отображаются на главной странице со светлым фоном, но используют тот же ресурс цвета текста, что и тёмная нижняя панель. В светлых темах с тёмной нижней панелью эти иконки выглядят как белое на белом.\n\n3. **Цвет кнопки по умолчанию в MessageBox = PageItem.Hint.Foreground**: кнопка по умолчанию/основная кнопка в диалоговых окнах использует цвет подсказки (акцент), а не `MessageBox.DefaultButton.Foreground`. Выделенный ресурс существует в XSD, но фактически не привязан в BAML.\n\n4. **ListAdorner.Background используется не по назначению**: по документации `ListAdorner.Background` должен управлять шапкой/декоратором списка на странице заказа. Фактически же он управляет: шапкой и подвалом карточек в гриде по официантам, невыбранными табами типов заказов на странице закрытых заказов. При этом `GridAdorner.Background`, который по логике названия должен использоваться для грида по официантам, не оказывает видимого влияния на UI — ресурс существует, но нигде не применяется.\n\n5. **Фон ценника жёстко задан белым в BAML**: белый ценник на карточках товаров не управляется темой. `CommonForeground.Black` задаёт цвет текста цены, создавая конфликт в тёмных темах, где это значение должно быть тёмным для ценника, но светлым для других применений.\n\n6. **Переопределения шрифтов вызывают неожиданную жирность**: синтез шрифтов WPF активируется, когда задано нестандартное семейство шрифтов и запрашивается жирное начертание, что приводит к более толстому, чем ожидалось, тексту.\n\n7. **Нет ListItem.Selected.Foreground**: цвет текста на выделенных строках списка определяется цветами статуса из конвертеров, а не ресурсом темы. Акцент должен сочетаться со всеми возможными цветами текста статусов.\n\n8. **Двойное использование цветов статуса**: цвета `TableStatus.*` используются одновременно как заливка фона столов на плане зала и как цвет текста блюд в режиме редактирования заказа через один и тот же конвертер. Невозможно оптимизировать для обоих случаев одновременно.\n\n9. **Белое поле ввода текста во всплывающем окне E-MAIL**: фон TextBox жёстко задан белым в BAML, что создаёт резкий вид в тёмных темах.\n\n---\n\n## 6. Приложение: Полная иерархия ресурсов (базовая тема DarkBlue)\n\n### Уровень окна\n| Ресурс | Значение | Назначение |\n|---|---|---|\n| `Window.Background` | `#FF1E1F22` | Фон главного окна, самый глубокий слой |\n| `Window.Foreground` | `#FF999999` | Вторичный/приглушённый цвет текста |\n| `GlassPane.Background` | `#40000000` | Полупрозрачное наложение для модальных окон |\n| `CommonForeground.Black` | `#FF303039` | Тёмный текст / текст ценника / цвет уровня поверхности |\n| `CommonForeground.White` | `#FFFFFFFF` | Белый текст |\n\n### Уровень заголовка\n| Ресурс | Значение | Назначение |\n|---|---|---|\n| `Header.Background` | `#FF303039` | Фон верхней панели заголовка |\n| `Header.Foreground` | `#FFFFFFFF` | Текст заголовка |\n| `HeaderItem.Normal.Background` | `#FF303039` | Фон вкладки/кнопки заголовка |\n| `HeaderItem.Normal.Foreground` | `#FFFFFFFF` | Текст вкладки/кнопки заголовка |\n| `HeaderItem.Disabled.Background` | `#FF303039` | Фон неактивной вкладки заголовка |\n| `HeaderItem.Disabled.Foreground` | `#FF1E1F22` | Текст неактивной вкладки заголовка |\n\n### Уровень страницы/блока\n| Ресурс | Значение | Назначение |\n|---|---|---|\n| `PageItem.Normal.Background` | `#FF303039` | Фон кнопки/карточки на уровне страницы |\n| `PageItem.Normal.Foreground` | `#FFFFFFFF` | Текст кнопки страницы |\n| `PageItem.Normal.Background.Light` | `#FF1E1F22` | Облегчённый вариант фона страницы |\n| `PageItem.Checked.Background` | `Button.Checked` | Выбранная кнопка страницы (акцент) |\n| `PageItem.Checked.Foreground` | `#FFFFFFFF` | Текст выб function simpleMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let inTable = false;
    let tableRows = [];

    function flushTable() {
        if (tableRows.length === 0) return;
        html += '<table>';
        for (let i = 0; i < tableRows.length; i++) {
            const cells = tableRows[i].split('|').map(c => c.trim()).filter(c => c);
            if (cells.every(c => /^[-:]+$/.test(c))) continue;
            const tag = (i === 0) ? 'th' : 'td';
            html += '<tr>' + cells.map(c => '<' + tag + '>' + c + '</' + tag + '>').join('') + '</tr>';
        }
        html += '</table>';
        tableRows = [];
        inTable = false;
    }

    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('|')) {
            inTable = true;
            tableRows.push(trimmed.replace(/^\||\|$/g, ''));
            continue;
        }
        if (inTable) flushTable();
        if (trimmed.startsWith('### ')) html += '<h3>' + trimmed.slice(4) + '</h3>';
        else if (trimmed.startsWith('## ')) html += '<h2>' + trimmed.slice(3) + '</h2>';
        else if (trimmed.startsWith('# ')) html += '<h1>' + trimmed.slice(2) + '</h1>';
        else if (trimmed === '---') html += '<hr>';
        else if (trimmed.startsWith('- ')) html += '<li>' + trimmed.slice(2) + '</li>';
        else if (trimmed === '') html += '<br>';
        else html += '<p>' + trimmed + '</p>';
    }
    if (inTable) flushTable();
    html = html.replace(/(<li>.*?<\/li>)+/g, m => '<ul>' + m + '</ul>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    return html;
}

function render() {
    // Top tabs
    const topTabs = document.getElementById('topTabs');
    topTabs.innerHTML = '';
    ['dark', 'light', 'doc'].forEach(mode => {
        const btn = document.createElement('button');
        btn.textContent = mode === 'dark' ? 'Dark Themes' : mode === 'light' ? 'Light Themes' : 'Documentation';
        btn.className = currentMode === mode ? 'active' : '';
        btn.onclick = () => {
            currentMode = mode;
            if (mode === 'dark') currentTheme = darkThemes[0].id;
            else if (mode === 'light') currentTheme = lightThemes[0].id;
            document.body.className = (mode === 'light' || mode === 'doc') ? 'light-mode' : '';
            render();
        };
        topTabs.appendChild(btn);
    });

    // Theme tabs
    const themeTabs = document.getElementById('themeTabs');
    themeTabs.innerHTML = '';

    if (currentMode === 'doc') {
        const content = document.getElementById('content');
        content.innerHTML = '<div class="doc-container">' + simpleMarkdown(DOC_CONTENT) + '</div>';
        return;
    }

    const themes = currentMode === 'dark' ? darkThemes : lightThemes;
    themes.forEach(t => {
        const btn = document.createElement('button');
        btn.textContent = t.label;
        btn.className = currentTheme === t.id ? 'active' : '';
        btn.onclick = () => { currentTheme = t.id; render(); };
        themeTabs.appendChild(btn);
    });

    // Content
    const content = document.getElementById('content');
    content.innerHTML = '';
    const baseId = currentMode === 'dark' ? 'DarkBasic' : 'LightBasic';
    const baseLabel = currentMode === 'dark' ? 'Default Dark' : 'Default Light';

    screens.forEach(s => {
        const title = document.createElement('div');
        title.className = 'screen-title';
        title.textContent = s.name;
        content.appendChild(title);

        const pair = document.createElement('div');
        pair.className = 'compare-pair';

        const leftLabel = document.createElement('div');
        leftLabel.className = 'label';
        leftLabel.textContent = baseLabel;

        const rightLabel = document.createElement('div');
        rightLabel.className = 'label';
        rightLabel.textContent = themes.find(t => t.id === currentTheme)?.label || currentTheme;

        const leftImg = document.createElement('img');
        leftImg.src = getImgPath(s.num, baseId);
        leftImg.alt = baseLabel + ' - ' + s.name;

        const rightImg = document.createElement('img');
        rightImg.src = getImgPath(s.num, currentTheme);
        rightImg.alt = currentTheme + ' - ' + s.name;

        const leftDiv = document.createElement('div');
        leftDiv.appendChild(leftLabel);
        leftDiv.appendChild(leftImg);

        const rightDiv = document.createElement('div');
        rightDiv.appendChild(rightLabel);
        rightDiv.appendChild(rightImg);

        pair.appendChild(leftDiv);
        pair.appendChild(rightDiv);
        content.appendChild(pair);
    });
}

render();
</script>
</body>
</html>
